name: Release

# Fires on tag push. The workflow_dispatch trigger lets us re-run an
# existing tag (e.g. to refresh assets after a missed secret) without
# a destructive delete + re-push.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Per-platform native builds — CGo can't cross-compile across OSes
  # because mattn/go-sqlite3 + sqlite-vec need the host toolchain.
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: |
          set -euxo pipefail
          VER="${GITHUB_REF_NAME#v}"
          OUT="anvil_${VER}_linux_amd64"
          mkdir -p "$OUT"
          CGO_ENABLED=1 go build -tags sqlite_fts5 \
            -ldflags "-s -w \
              -X github.com/ugurcan-aytar/anvil/internal/commands.Version=${VER} \
              -X github.com/ugurcan-aytar/anvil/internal/commands.Commit=${GITHUB_SHA::7} \
              -X github.com/ugurcan-aytar/anvil/internal/commands.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "$OUT/anvil" ./cmd/anvil
          cp README.md LICENSE CHANGELOG.md "$OUT/" 2>/dev/null || true
          tar -czf "${OUT}.tar.gz" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: '*.tar.gz'

  build-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: |
          set -euxo pipefail
          VER="${GITHUB_REF_NAME#v}"
          OUT="anvil_${VER}_darwin_arm64"
          mkdir -p "$OUT"
          CGO_ENABLED=1 go build -tags sqlite_fts5 \
            -ldflags "-s -w \
              -X github.com/ugurcan-aytar/anvil/internal/commands.Version=${VER} \
              -X github.com/ugurcan-aytar/anvil/internal/commands.Commit=${GITHUB_SHA::7} \
              -X github.com/ugurcan-aytar/anvil/internal/commands.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "$OUT/anvil" ./cmd/anvil
          cp README.md LICENSE CHANGELOG.md "$OUT/" 2>/dev/null || true
          tar -czf "${OUT}.tar.gz" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: '*.tar.gz'

  # Assemble release + checksums. Homebrew tap push lands in v0.2.0+.
  publish:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp -v {} release/ \;
          cd release
          shasum -a 256 *.tar.gz > checksums.txt
          BODY="$(git for-each-ref --format='%(contents)' "refs/tags/${TAG}" | head -200)"
          # Create the release if it doesn't exist; otherwise clobber assets.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" ./* --clobber
            gh release edit "$TAG" --draft=false --notes "$BODY" --title "anvil $TAG"
          else
            gh release create "$TAG" ./* --title "anvil $TAG" --notes "$BODY"
          fi

      # Homebrew tap push — mirrors the recall + brain workflow.
      # Gracefully skips when HOMEBREW_TAP_GITHUB_TOKEN isn't set so
      # forks without a tap repo don't fail the release.
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          DARWIN_SHA=$(shasum -a 256 "release/anvil_${VER}_darwin_arm64.tar.gz" | awk '{print $1}')
          LINUX_SHA=$(shasum -a 256 "release/anvil_${VER}_linux_amd64.tar.gz" | awk '{print $1}')

          cat > formula.rb <<FORMULA
          class Anvil < Formula
            desc "LLM-maintained wiki compiler"
            homepage "https://github.com/ugurcan-aytar/anvil"
            license "MIT"
            version "${VER}"

            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/ugurcan-aytar/anvil/releases/download/${TAG}/anvil_${VER}_darwin_arm64.tar.gz"
              sha256 "${DARWIN_SHA}"
            elsif OS.linux? && Hardware::CPU.intel?
              url "https://github.com/ugurcan-aytar/anvil/releases/download/${TAG}/anvil_${VER}_linux_amd64.tar.gz"
              sha256 "${LINUX_SHA}"
            end

            def install
              bin.install "anvil_${VER}_#{OS.mac? ? "darwin_arm64" : "linux_amd64"}/anvil"
            end

            test do
              system "#{bin}/anvil", "version"
            end
          end
          FORMULA

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ugurcan-aytar/homebrew-anvil.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/anvil.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "anvil ${VER}" || echo "no-op — formula already current"
          git push
