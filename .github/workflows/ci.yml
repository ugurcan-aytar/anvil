name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      # sqlite_fts5 is mandatory — recall requires FTS5, which is opt-in
      # behind this tag in mattn/go-sqlite3. Without it every engine-backed
      # test fails on open with a "missing FTS5 support" error.
      - run: go build -tags sqlite_fts5 ./...
      - run: go test -tags sqlite_fts5 -race ./...
